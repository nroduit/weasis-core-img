name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

# Cancel superseded runs on the same branch/PR; the latest push is the only one worth building.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0  # full history is handed to Sonar for blame / new-code relevancy
          persist-credentials: false
      - name: Set up JDK for compilation
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and test
        run: mvn -Pcoverage -f weasis-core-img -B verify
      # Sonar analysis runs in a separate workflow_run-triggered workflow (sonar.yml) so it has
      # access to SONAR_TOKEN even for pull requests from forks and Dependabot (where secrets are
      # withheld from the triggering workflow). To keep that privileged job from ever executing
      # untrusted fork code, ALL building happens here (this job has no secrets) and only the
      # prebuilt analysis inputs below are handed over; the Sonar job runs the standalone scanner
      # on them and never builds the PR head.
      - name: Collect dependency jars for Sonar (sonar.java.libraries)
        run: mvn -B -f weasis-core-img dependency:copy-dependencies -DincludeScope=test -DoutputDirectory=target/sonar-libs
      - name: Save PR context for Sonar analysis
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p pr-context
          echo "${{ github.event.pull_request.number }}" > pr-context/pr_number
          echo "${{ github.event.pull_request.head.ref }}" > pr-context/head_ref
          echo "${{ github.event.pull_request.base.ref }}" > pr-context/base_ref
      # A single tarball keeps .git (and other dotfiles) intact regardless of the upload action's
      # hidden-file handling, and is faster to move than thousands of class files.
      - name: Package Sonar analysis input
        run: |
          tar czf sonar-input.tgz \
            .git weasis-core-img/pom.xml \
            weasis-core-img/src/main/java weasis-core-img/src/test/java \
            weasis-core-img/target/classes weasis-core-img/target/test-classes \
            weasis-core-img/target/surefire-reports \
            weasis-core-img/target/site/jacoco/jacoco.xml weasis-core-img/target/sonar-libs \
            $([ -d pr-context ] && echo pr-context)
      - name: Upload Sonar analysis input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sonar-input
          path: sonar-input.tgz
          retention-days: 1